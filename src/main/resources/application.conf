server {
  port = 8080
}

database {
  url = "jdbc:postgresql://localhost:5432/eilaji"
  user = "eilaji"
  password = "eilaji_password"
  driver = "org.postgresql.Driver"
}

redis {
  url = "redis://localhost:6379"
}

minio {
  endpoint = "http://localhost:9000"
  accessKey = "minioadmin"
  secretKey = "minioadmin"
  region = "us-east-1"
}

jwt {
  secret = "your-super-secret-jwt-key-change-in-production"
  issuer = "eilaji-backend"
  audience = "eilaji-client"
  realm = "Eilaji API"
}

eilaji-plus {
  baseUrl = ""
  apiKey = ""
}
