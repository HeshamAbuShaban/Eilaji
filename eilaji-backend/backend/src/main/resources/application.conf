# Application Configuration
ktor {
    deployment {
        port = 8080
        watch = ["com.eilaji.backend"]
    }
    
    application {
        modules = ["com.eilaji.backend.ApplicationKt.module"]
    }
}

# Database Configuration
database {
    url = "jdbc:postgresql://localhost:5432/eilaji_db"
    driver = "org.postgresql.Driver"
    user = "eilaji"
    password = "eilaji_password_change_in_production"
    poolSize = 10
}

# Redis Configuration
redis {
    host = "localhost"
    port = 6379
    password = ""
    database = 0
}

# MinIO Configuration
minio {
    endpoint = "http://localhost:9000"
    accessKey = "eilaji_minio_admin"
    secretKey = "eilaji_minio_password_change_in_production"
    buckets {
        prescriptions = "prescriptions"
        medicineImages = "medicine-images"
        pharmacyImages = "pharmacy-images"
        userAvatars = "user-avatars"
    }
}

# JWT Configuration
jwt {
    secret = "change-this-to-a-secure-random-string-in-production-min-32-chars"
    issuer = "eilaji-backend"
    audience = "eilaji-apps"
    expiresIn = 86400000 # 24 hours in milliseconds
    refreshExpiresIn = 604800000 # 7 days in milliseconds
}

# FCM Configuration (keep Firebase only for push notifications)
fcm {
    projectId = "your-firebase-project-id"
    # Service account JSON will be loaded from resources/fcm-service-account.json
}

# CORS Configuration
cors {
    allowedHosts = ["*"] # Change in production to specific domains
    allowedMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowedHeaders = ["Content-Type", "Authorization", "X-Requested-With"]
    allowCredentials = true
}

# Rate Limiting
rateLimit {
    enabled = true
    requestsPerSecond = 10
    burst = 20
}

# Logging
logging {
    level = "DEBUG"
    sqlLogging = true # Set to false in production
}
